<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>水下节点信号传输监控</title><script src="tailwindcss.js"></script><script src="iconify-icon.min.js"></script></head><body><style id="uw-style">
@keyframes signalPulse {
0% { stroke-dashoffset: 100; opacity: 1; }
100% { stroke-dashoffset: 0; opacity: 0; }
}
@keyframes nodePulse {
0%, 100% { box-shadow: 0 0 20px rgba(56, 189, 248, 0.5); }
50% { box-shadow: 0 0 40px rgba(56, 189, 248, 0.8); }
}
@keyframes collisionExplode {
0% { transform: scale(0); opacity: 1; }
50% { transform: scale(2); opacity: 0.8; }
100% { transform: scale(3); opacity: 0; }
}
@keyframes floatBubble {
0% { transform: translateY(100vh) scale(0); opacity: 0; }
10% { opacity: 0.6; }
90% { opacity: 0.6; }
100% { transform: translateY(-100px) scale(1); opacity: 0; }
}
@keyframes signalDotMove {
0% { offset-distance: 0%; opacity: 1; }
90% { opacity: 1; }
100% { offset-distance: 100%; opacity: 0; }
}
.ocean-bg {
background: linear-gradient(180deg, #0a1628 0%, #0d2847 30%, #0a3a5c 60%, #064e6b 100%);
}
.node {
animation: nodePulse 3s ease-in-out infinite;
}
.signal-path {
stroke-dasharray: 8 4;
stroke-dashoffset: 100;
animation: signalPulse 1.5s linear;
}
.collision-effect {
animation: collisionExplode 0.8s ease-out forwards;
}
.bubble {
position: absolute;
border-radius: 50%;
background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.3), rgba(255,255,255,0.1));
animation: floatBubble 8s ease-in infinite;
}
.log-entry {
transition: all 0.3s ease;
}
.log-entry:hover {
transform: translateX(5px);
}
</style>

<script id="uw-script">(function() { 
const nodes = {
'A': document.getElementById('node-1'),
'B': document.getElementById('node-2'),
'C': document.getElementById('node-3'),
'D': document.getElementById('node-4'),
'E': document.getElementById('node-5'),
'F': document.getElementById('node-6'),
'G': document.getElementById('node-7'),
'H': document.getElementById('node-8'),
'I': document.getElementById('node-9'),
'J': document.getElementById('node-10')
};

const canvas = document.getElementById('signal-canvas');
const signalsLayer = document.getElementById('signals-layer');
const effectsLayer = document.getElementById('effects-layer');
const logContainer = document.getElementById('log-container');
const collisionContainer = document.getElementById('collision-container');

let stats = { total: 0, success: 0, collision: 0, lost: 0 };
let autoSimInterval = null;

function getNodeCenter(nodeId) {
const node = nodes[nodeId];
const rect = node.getBoundingClientRect();
const containerRect = document.getElementById('canvas-container').getBoundingClientRect();
return {
x: rect.left - containerRect.left + rect.width / 2,
y: rect.top - containerRect.top + rect.height / 2
};
}

function createBubble() {
const bubble = document.createElement('div');
bubble.className = 'bubble';
const size = Math.random() * 20 + 10;
bubble.style.width = size + 'px';
bubble.style.height = size + 'px';
bubble.style.left = Math.random() * 100 + '%';
bubble.style.animationDelay = Math.random() * 5 + 's';
bubble.style.animationDuration = (Math.random() * 4 + 6) + 's';
document.getElementById('bubbles-container').appendChild(bubble);

setTimeout(() => bubble.remove(), 12000);
}

setInterval(createBubble, 800);

function sendSignal(fromId, toId, type = 'normal') {
const from = getNodeCenter(fromId);
const to = getNodeCenter(toId);

stats.total++;
updateStats();

const pathId = 'path-' + Date.now() + '-' + Math.random();
const color = type === 'collision' ? '#f87171' : type === 'lost' ? '#fb923c' : '#22d3ee';

const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
path.setAttribute('id', pathId);
path.setAttribute('d', `M ${from.x} ${from.y} L ${to.x} ${to.y}`);
path.setAttribute('stroke', color);
path.setAttribute('stroke-width', '2');
path.setAttribute('fill', 'none');
path.setAttribute('stroke-dasharray', '8,4');
path.setAttribute('filter', 'url(#glow)');
path.style.animation = 'signalPulse 1.5s linear';

signalsLayer.appendChild(path);

const signalDot = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
signalDot.setAttribute('r', '6');
signalDot.setAttribute('fill', color);
signalDot.innerHTML = `
<animateMotion dur="1.5s" repeatCount="1" path="M ${from.x} ${from.y} L ${to.x} ${to.y}" />
`;
signalsLayer.appendChild(signalDot);

setTimeout(() => {
path.remove();
signalDot.remove();

if (type === 'collision') {
showCollision((from.x + to.x) / 2, (from.y + to.y) / 2);
stats.collision++;
addLog('碰撞', `${fromId} → ${toId} 信号发生碰撞`, 'red');
} else if (type === 'lost') {
showLostEffect(to.x, to.y);
stats.lost++;
addLog('丢失', `${fromId} → ${toId} 信号丢失`, 'orange');
} else {
stats.success++;
addLog('发送', `${fromId} → ${toId} 信号发送成功`, 'cyan');
}
updateStats();
}, 1500);
}

function showCollision(x, y) {
const effect = document.createElement('div');
effect.className = 'collision-effect absolute w-12 h-12 rounded-full border-4 border-red-400 bg-red-400/30';
effect.style.left = (x - 24) + 'px';
effect.style.top = (y - 24) + 'px';
collisionContainer.appendChild(effect);

const burst = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
burst.setAttribute('cx', x);
burst.setAttribute('cy', y);
burst.setAttribute('r', '5');
burst.setAttribute('fill', 'none');
burst.setAttribute('stroke', '#f87171');
burst.setAttribute('stroke-width', '3');
burst.innerHTML = `
<animate attributeName="r" from="5" to="50" dur="0.5s" fill="freeze" />
<animate attributeName="opacity" from="1" to="0" dur="0.5s" fill="freeze" />
`;
effectsLayer.appendChild(burst);

setTimeout(() => {
effect.remove();
burst.remove();
}, 800);
}

function showLostEffect(x, y) {
const xMark = document.createElement('div');
xMark.className = 'absolute text-orange-400 text-3xl font-bold';
xMark.style.left = (x - 10) + 'px';
xMark.style.top = (y - 15) + 'px';
xMark.innerHTML = '✕';
xMark.style.animation = 'collisionExplode 0.6s ease-out forwards';
collisionContainer.appendChild(xMark);

setTimeout(() => xMark.remove(), 600);
}

function addLog(type, message, color) {
const entry = document.createElement('div');
entry.className = 'log-entry bg-slate-800/60 rounded-lg p-3 border-l-4 text-sm';
entry.style.borderLeftColor = color === 'cyan' ? '#22d3ee' : color === 'red' ? '#f87171' : '#fb923c';

const time = new Date().toLocaleTimeString('zh-CN', { hour12: false });
entry.innerHTML = `
<div class="flex items-center justify-between mb-1">
<span class="text-${color}-400 font-semibold text-xs">${type}</span>
<span class="text-slate-500 text-xs font-mono">${time}</span>
</div>
<div class="text-slate-200">${message}</div>
`;

logContainer.insertBefore(entry, logContainer.firstChild);

while (logContainer.children.length > 50) {
logContainer.removeChild(logContainer.lastChild);
}
}

function updateStats() {
document.getElementById('stat-total').textContent = stats.total;
document.getElementById('stat-success').textContent = stats.success;
document.getElementById('stat-collision').textContent = stats.collision;
document.getElementById('stat-lost').textContent = stats.lost;
}

function simulateCollision() {
const nodeKeys = Object.keys(nodes);
const from1 = nodeKeys[Math.floor(Math.random() * nodeKeys.length)];
const from2 = nodeKeys[Math.floor(Math.random() * nodeKeys.length)];
const to = nodeKeys[Math.floor(Math.random() * nodeKeys.length)];

if (from1 !== to && from2 !== to && from1 !== from2) {
sendSignal(from1, to, 'collision');
setTimeout(() => sendSignal(from2, to, 'collision'), 100);
}
}

function simulateLost() {
const nodeKeys = Object.keys(nodes);
const from = nodeKeys[Math.floor(Math.random() * nodeKeys.length)];
const to = nodeKeys[Math.floor(Math.random() * nodeKeys.length)];
if (from !== to) {
sendSignal(from, to, 'lost');
}
}

function randomSimulation() {
const actions = ['send', 'send', 'send', 'collision', 'lost'];
const action = actions[Math.floor(Math.random() * actions.length)];
const nodeKeys = Object.keys(nodes);

if (action === 'send') {
const from = nodeKeys[Math.floor(Math.random() * nodeKeys.length)];
const to = nodeKeys[Math.floor(Math.random() * nodeKeys.length)];
if (from !== to) sendSignal(from, to);
} else if (action === 'collision') {
simulateCollision();
} else {
simulateLost();
}
}

document.getElementById('btn-auto-sim').addEventListener('click', function() {
if (autoSimInterval) {
clearInterval(autoSimInterval);
autoSimInterval = null;
this.innerHTML = '<iconify-icon icon="mdi:play"></iconify-icon>自动模拟';
this.classList.remove('bg-red-600', 'hover:bg-red-500');
this.classList.add('bg-cyan-600', 'hover:bg-cyan-500');
} else {
autoSimInterval = setInterval(randomSimulation, 2000);
